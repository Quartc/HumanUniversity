{% extends "base.html" %}

{% block title %}Галерея — Человек и Вселенная{% endblock %}

{% block content %}
<div class="content-card-full">
    <h1 class="page-title">Галерея космоса</h1>
    <p class="page-subtitle">Визуальное путешествие по бескрайним просторам Вселенной</p>
    
    <div class="gallery-filters" style="display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; flex-wrap: wrap;">
        <button class="filter-btn active" data-filter="all">Все</button>
        <button class="filter-btn" data-filter="history">История</button>
        <button class="filter-btn" data-filter="space">Космос</button>
        <button class="filter-btn" data-filter="science">Наука</button>
        <button class="filter-btn" data-filter="technology">Технологии</button>
        <button class="filter-btn" data-filter="philosophy">Философия</button>
    </div>
    
    <div class="gallery-grid" id="gallery-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px;">
        {% for item in gallery_items %}
        <div class="gallery-item" data-category="{{ item.category }}" data-id="{{ item.id }}" style="background: rgba(255,255,255,0.1); border-radius: 15px; overflow: hidden; cursor: pointer;">
            <div class="gallery-image" style="position: relative; overflow: hidden; aspect-ratio: 16/10;">
                <img src="{{ url_for('static', filename='images/gallery/' + item.image) }}" alt="{{ item.title }}" style="width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s;">
                <div class="gallery-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s;">
                    <h3 style="color: white; margin-bottom: 10px;">{{ item.title }}</h3>
                    <button class="btn-view" onclick="event.stopPropagation(); openModal({{ item.id }})" style="padding: 8px 20px; background: #6c5ce7; color: white; border: none; border-radius: 25px; cursor: pointer;">Подробнее</button>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<div id="imageModal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; justify-content: center; align-items: center;">
    <div class="modal-content" style="background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); max-width: 800px; width: 90%; border-radius: 20px; padding: 30px; position: relative; border: 1px solid rgba(108, 92, 231, 0.5);">
        <button class="modal-close-btn" onclick="closeModal()" style="position: absolute; top: 15px; right: 20px; font-size: 30px; cursor: pointer; color: white; background: none; border: none; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: all 0.3s;">&times;</button>
        <img id="modalImage" src="" alt="" style="width: 100%; border-radius: 15px; margin-bottom: 20px;">
        <h3 id="modalTitle" style="color: white; margin-top: 0; font-size: 1.5rem;"></h3>
        <p id="modalDescription" style="color: rgba(255,255,255,0.9); line-height: 1.6;"></p>
    </div>
</div>

<style>
    .modal-close-btn:hover {
        background: rgba(255,255,255,0.2);
        transform: scale(1.1);
    }
    
    .gallery-item {
        transition: transform 0.3s;
    }
    
    .gallery-item:hover {
        transform: translateY(-5px);
    }
</style>
{% endblock %}

{% block scripts %}
<script>
const filterBtns = document.querySelectorAll('.filter-btn');
const galleryItems = document.querySelectorAll('.gallery-item');

filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const filter = btn.dataset.filter;
        
        galleryItems.forEach(item => {
            if (filter === 'all' || item.dataset.category === filter) {
                item.style.display = 'block';
            } else {
                item.style.display = 'none';
            }
        });
    });
});

const modal = document.getElementById('imageModal');
const modalImg = document.getElementById('modalImage');
const modalTitle = document.getElementById('modalTitle');
const modalDesc = document.getElementById('modalDescription');

window.openModal = async (id) => {
    try {
        const response = await fetch(`/api/gallery/${id}`);
        const data = await response.json();
        
        modalImg.src = `/static/images/gallery/${data.image}`;
        modalTitle.textContent = data.title;
        modalDesc.textContent = data.description;
        modal.style.display = 'flex';
        
        // Блокируем скролл на body
        document.body.style.overflow = 'hidden';
    } catch (error) {
        console.error('Ошибка загрузки данных:', error);
    }
};

window.closeModal = () => {
    modal.style.display = 'none';
    document.body.style.overflow = 'auto';
};

modal.addEventListener('click', (e) => {
    if (e.target === modal) {
        closeModal();
    }
});

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && modal.style.display === 'flex') {
        closeModal();
    }
});

document.querySelectorAll('.gallery-item').forEach(item => {
    const img = item.querySelector('.gallery-image img');
    const overlay = item.querySelector('.gallery-overlay');
    
    item.addEventListener('mouseenter', () => {
        if (img) img.style.transform = 'scale(1.1)';
        if (overlay) overlay.style.opacity = '1';
    });
    
    item.addEventListener('mouseleave', () => {
        if (img) img.style.transform = 'scale(1)';
        if (overlay) overlay.style.opacity = '0';
    });
});
</script>
{% endblock %}
