{% extends "base.html" %}

{% block title %}Галерея — Человек и Вселенная{% endblock %}

{% block content %}
<div class="content-card-full gallery-container">
    <h1 class="page-title">Галерея космоса</h1>
    <p class="page-subtitle">Визуальное путешествие по бескрайним просторам Вселенной</p>
    
    <div class="gallery-filters">
        <button class="filter-btn active" data-filter="all">Все</button>
        <button class="filter-btn" data-filter="history">История</button>
        <button class="filter-btn" data-filter="space">Космос</button>
        <button class="filter-btn" data-filter="science">Наука</button>
        <button class="filter-btn" data-filter="technology">Технологии</button>
        <button class="filter-btn" data-filter="philosophy">Философия</button>
    </div>
    
    <div class="gallery-grid" id="gallery-grid">
        {% for item in gallery_items %}
        <div class="gallery-item" data-category="{{ item.category }}" data-id="{{ item.id }}">
            <div class="gallery-image">
                <img src="{{ url_for('static', filename='images/gallery/' + item.image) }}" alt="{{ item.title }}">
                <div class="gallery-overlay">
                    <h3>{{ item.title }}</h3>
                    <button class="btn-view" data-id="{{ item.id }}">Подробнее</button>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<div id="imageModal" class="modal">
    <div class="modal-content">
        <button class="modal-close-btn" onclick="closeModal()">&times;</button>
        <img id="modalImage" src="" alt="">
        <h3 id="modalTitle"></h3>
        <p id="modalDescription"></p>
    </div>
</div>

<style>
.gallery-container {
    padding: 40px;
    overflow-x: hidden;
}

.gallery-filters {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-bottom: 40px;
    flex-wrap: wrap;
}

.filter-btn {
    padding: 8px 20px;
    border: 2px solid #6c5ce7;
    background: transparent;
    color: #6c5ce7;
    border-radius: 25px;
    cursor: pointer;
    transition: all 0.3s;
    font-weight: 500;
    font-size: 0.9rem;
}

.filter-btn.active,
.filter-btn:hover {
    background: #6c5ce7;
    color: white;
}

.gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 25px;
    width: 100%;
}

.gallery-item {
    background: rgba(255,255,255,0.1);
    border-radius: 15px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.3s;
    width: 100%;
}

.gallery-item:hover {
    transform: translateY(-5px);
}

.gallery-image {
    position: relative;
    overflow: hidden;
    aspect-ratio: 16 / 10;
    width: 100%;
}

.gallery-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease;
    display: block;
}

.gallery-item:hover .gallery-image img {
    transform: scale(1.1);
}

.gallery-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    opacity: 0;
    transition: opacity 0.3s ease;
}

.gallery-item:hover .gallery-overlay {
    opacity: 1 !important;
}

.gallery-overlay h3 {
    color: white;
    margin-bottom: 10px;
    text-align: center;
    padding: 0 20px;
    font-size: 1.1rem;
}

.btn-view {
    padding: 8px 20px;
    background: #6c5ce7;
    color: white;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.btn-view:hover {
    background: #5a4bd1;
    transform: scale(1.05);
}

.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    z-index: 9999;
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: rgba(0,0,0,0.9);
    backdrop-filter: blur(20px);
    max-width: 800px;
    width: 90%;
    border-radius: 20px;
    padding: 30px;
    position: relative;
    border: 1px solid rgba(108, 92, 231, 0.5);
    max-height: 90vh;
    overflow-y: auto;
}

.modal-close-btn {
    position: absolute;
    top: 15px;
    right: 20px;
    font-size: 30px;
    cursor: pointer;
    color: white;
    background: none;
    border: none;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: all 0.3s;
}

.modal-close-btn:hover {
    background: rgba(255,255,255,0.2);
    transform: scale(1.1);
}

.modal-content img {
    width: 100%;
    border-radius: 15px;
    margin-bottom: 20px;
}

.modal-content h3 {
    color: white;
    margin-top: 0;
    font-size: 1.5rem;
}

.modal-content p {
    color: rgba(255,255,255,0.9);
    line-height: 1.6;
}

@media (max-width: 768px) {
    .gallery-container {
        padding: 20px;
    }
    
    .gallery-grid {
        grid-template-columns: 1fr;
        gap: 20px;
    }
    
    .gallery-filters {
        gap: 10px;
        margin-bottom: 25px;
    }
    
    .filter-btn {
        padding: 6px 14px;
        font-size: 0.85rem;
    }
    
    .modal-content {
        padding: 20px;
        width: 95%;
    }
    
    .modal-content h3 {
        font-size: 1.2rem;
    }
    
    .modal-content p {
        font-size: 0.9rem;
    }
    
    .gallery-overlay h3 {
        font-size: 0.9rem;
    }
    
    .btn-view {
        padding: 6px 16px;
        font-size: 0.85rem;
    }
}
</style>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const filterBtns = document.querySelectorAll('.filter-btn');
    const galleryItems = document.querySelectorAll('.gallery-item');

    filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            filterBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const filter = btn.dataset.filter;
            
            galleryItems.forEach(item => {
                if (filter === 'all' || item.dataset.category === filter) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        });
    });
    
    const galleryGrid = document.getElementById('gallery-grid');
    if (galleryGrid) {
        galleryGrid.addEventListener('click', function(e) {
            const button = e.target.closest('.btn-view');
            if (button) {
                e.stopPropagation();
                const itemId = button.getAttribute('data-id');
                if (itemId) {
                    openModal(itemId);
                }
            }
        });
    }
});

const modal = document.getElementById('imageModal');
const modalImg = document.getElementById('modalImage');
const modalTitle = document.getElementById('modalTitle');
const modalDesc = document.getElementById('modalDescription');

window.openModal = async (id) => {
    try {
        const response = await fetch(`/api/gallery/${id}`);
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }
        const data = await response.json();
        
        modalImg.src = `/static/images/gallery/${data.image}`;
        modalTitle.textContent = data.title;
        modalDesc.textContent = data.description;
        modal.style.display = 'flex';
        
        document.body.style.overflow = 'hidden';
    } catch (error) {
        console.error('Ошибка загрузки данных:', error);
        alert('Не удалось загрузить информацию. Пожалуйста, попробуйте позже.');
    }
};

window.closeModal = () => {
    modal.style.display = 'none';
    document.body.style.overflow = 'auto';
};

if (modal) {
    modal.addEventListener('click', (e) => {
        if (e.target === modal) {
            closeModal();
        }
    });
}

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && modal && modal.style.display === 'flex') {
        closeModal();
    }
});
</script>
{% endblock %}
